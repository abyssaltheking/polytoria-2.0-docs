Name: PreferencesService
Description: PreferencesService is a service that allows scripts to access some
  of the user preferences
Category: services
BaseType: Instance
Properties:
  - Name: CameraSensitivity
    Type: number
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: false
    Description: Missing Documentation
  - Name: UiScale
    Type: number
    IsAccessibleByScripts: true
    IsReadOnly: true
    IsObsolete: false
    IsStatic: false
    Description: Missing Documentation
Methods:
  - Name: Get
    ReturnType: any
    Parameters:
      - Name: name
        Type: string
        IsOptional: false
        DefaultValue: ""
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    IsSemiStatic: false
    Description: Missing Documentation
Events:
  - Name: SettingChanged
    Parameters:
      - Name: string
        Type: string
        IsOptional: false
        DefaultValue: null
      - Name: any
        Type: any
        IsOptional: false
        DefaultValue: null
    Description: Fired when a user preference setting is changed.
    Arguments:
      - Name: settingName
        Type: string
      - Name: setTo
        Type: any
IsStatic: true
IsAbstract: false
IsInstantiable: false
StaticAlias: Preferences
