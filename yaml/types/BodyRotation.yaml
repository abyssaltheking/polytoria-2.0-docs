Name: BodyRotation
Description: BodyRotation are objects that apply a force to their parent until
  they reach the target rotation.
Category: physics
BaseType: Instance
Properties:
  - Name: TargetRotation
    Type: Vector3
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: Determines the target rotation that the body applies forces to get to.
  - Name: Force
    Type: number
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: Determines how much force the body applies.
  - Name: AcceptanceAngle
    Type: number
    IsAccessibleByScripts: true
    IsReadOnly: false
    IsObsolete: false
    IsStatic: false
    Description: Determines how close the body has to be to the target rotation to
      stop applying forces to it.
Methods:
  - Name: SetQuaternion
    ReturnType: nil
    Parameters:
      - Name: quaternion
        Type: Quaternion
        IsOptional: false
        DefaultValue: ""
    IsAsync: false
    IsObsolete: false
    IsStatic: false
    IsSemiStatic: false
    Description: Sets target rotation to the given quaternion.
Events: []
IsStatic: false
IsAbstract: false
IsInstantiable: true
StaticAlias: null
